name: cron

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  tifa-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shiron-dev/actions/setup-node@d898596addf114b0b4a4cd9a984775410e248e10 # v1.6.2
      - name: Run install
        run: |
          pnpm install --frozen-lockfile
      - name: Run start
        run: pnpm run start
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REVIEW_REQUESTED_HOURS: 3
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
